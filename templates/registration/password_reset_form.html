{% extends 'core/base.html' %}

{% block title %}Mot de passe oublié — Petites Annonces Théâtre{% endblock %}

{% block main %}

<div class="relative overflow-hidden w-full bg-ink py-10 md:py-14">
    <div class="absolute inset-0 pointer-events-none"
         style="background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 12px);"></div>
    <div class="relative max-w-screen-xl mx-auto px-4 md:px-8">
        <h1 class="font-display font-bold text-white text-2xl sm:text-3xl uppercase tracking-[0.04em]">
            Mot de passe oublié
        </h1>
        <p class="text-white/40 text-sm mt-2">Nous vous enverrons un lien de réinitialisation.</p>
    </div>
</div>

<div class="max-w-sm mx-auto px-4 py-10">
    <form method="post" class="space-y-5">
        {% csrf_token %}
        <div class="space-y-1.5">
            <label for="id_email"
                   class="block text-[10px] font-bold uppercase tracking-[0.16em] text-ink-muted">
                Adresse email
            </label>
            <input type="email" name="email" id="id_email"
                   class="w-full border border-ink/20 px-3 py-2.5 text-sm text-ink
                          focus:outline-none focus:border-ink transition-colors bg-surface"
                   autocomplete="email" maxlength="254" required placeholder="vous@exemple.fr">
        </div>
        <button type="submit"
                class="w-full py-3 bg-ink text-white text-[11px] font-bold uppercase tracking-[0.14em]
                       hover:opacity-80 transition-opacity">
            Réinitialiser mon mot de passe
        </button>
    </form>
    <div class="border-t border-ink/8 mt-8 pt-8 text-center">
        <a href="{% url 'login' %}"
           class="text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted hover:text-ink transition-colors">
            ← Retour à la connexion
        </a>
    </div>
</div>

{% endblock %}
