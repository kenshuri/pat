{% extends 'core/base.html' %}

{% block title %}Mot de passe modifié — Petites Annonces Théâtre{% endblock %}

{% block main %}

<div class="relative overflow-hidden w-full bg-ink py-10 md:py-14">
    <div class="absolute inset-0 pointer-events-none"
         style="background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 12px);"></div>
    <div class="relative max-w-screen-xl mx-auto px-4 md:px-8">
        <h1 class="font-display font-bold text-white text-2xl sm:text-3xl uppercase tracking-[0.04em]">
            Mot de passe modifié
        </h1>
        <p class="text-white/40 text-sm mt-2">Votre mot de passe a bien été mis à jour.</p>
    </div>
</div>

<div class="max-w-sm mx-auto px-4 py-10 text-center">
    <p class="text-sm text-ink-soft mb-8">
        Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
    </p>
    <a href="{% url 'login' %}"
       class="inline-flex items-center justify-center w-full py-3
              bg-ink text-white text-[11px] font-bold uppercase tracking-[0.14em]
              hover:opacity-80 transition-opacity">
        Se connecter
    </a>
</div>

{% endblock %}
