{% load static %}
<a href="{% url 'shows:play_detail' pk=21 %}" class="group flex items-stretch mb-6 bg-primary hover:opacity-90 transition-opacity">

    <!-- Affiche -->
    <div class="w-16 sm:w-20 shrink-0">
        <img src="{% static 'promote/poster_'|add:promo.slug|add:'.webp' %}"
             alt="Affiche Emma Picard"
             width="80" height="112"
             class="w-full h-full object-cover"
             style="min-height: 88px; display: block;">
    </div>

    <!-- Texte -->
    <div class="flex flex-1 items-center justify-between px-4 py-3 gap-3 min-w-0">
        <div class="min-w-0">
            <span class="font-display text-[9px] font-bold uppercase tracking-[0.20em] text-white/25 block mb-1.5">Publicité</span>
            <p class="font-display font-bold text-white text-sm sm:text-base leading-tight uppercase tracking-wide truncate">
                Emma Picard
            </p>
            <p class="text-white/50 text-xs mt-1 hidden sm:block italic">
                « Bouleversant d'humanité ! »
            </p>
            <p class="text-white/35 text-[11px] mt-1">
                <span class="hidden sm:inline">Essaïon Théâtre — </span>Paris
                · <time datetime="2025-12-09">9 déc.</time>–<time datetime="2025-12-16">16 déc.</time>
            </p>
        </div>

        <span class="shrink-0 font-display text-[10px] font-bold uppercase tracking-[0.12em]
                     border border-white/20 text-white/40 group-hover:border-white/50 group-hover:text-white
                     px-3 py-1.5 transition-colors whitespace-nowrap">
            Voir →
        </span>
    </div>
</a>
