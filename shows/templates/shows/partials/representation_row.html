<div class="flex items-center justify-between gap-4 py-3.5 transition-opacity duration-300" data-rep-row>
    <div class="space-y-0.5">
        <p class="text-sm font-medium text-ink">{{ rep.datetime|date:"l d/m/Y à H:i" }}</p>
        <p class="text-xs text-ink-muted">
            {% if rep.city %}{{ rep.city }}{% endif %}
            {% if rep.venue %} — {{ rep.venue }}{% endif %}
            {% if rep.price %} · {{ rep.price }}{% endif %}
        </p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
        {% if rep.ticket_url %}
        <a href="{{ rep.ticket_url }}" target="_blank" rel="noopener"
           class="inline-flex items-center gap-1.5 px-3 py-1.5
                  bg-ink text-white text-[9px] font-bold uppercase tracking-[0.12em]
                  hover:opacity-80 transition-opacity">
            <i class="fa-solid fa-ticket text-[8px]"></i>
            Billets
        </a>
        {% endif %}
        {% if rep.play.user == user %}
        <button onclick="fadeAndDelete(this, '{% url 'shows:delete_representation' rep.pk %}')"
                class="inline-flex items-center px-2.5 py-1.5
                       text-[9px] font-bold uppercase tracking-[0.10em]
                       border border-red-200 text-red-400 hover:bg-red-50 hover:border-red-300
                       transition-colors">
            <i class="fa-solid fa-trash text-[8px]"></i>
        </button>
        {% endif %}
    </div>
</div>
