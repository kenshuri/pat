<form method="post"
      hx-post="{% url 'shows:add_representation' play.pk %}"
      hx-target="#representations-list"
      hx-swap="beforeend"
      hx-on::after-request="if(event.detail.successful){ this.reset(); document.getElementById('representation-form').innerHTML=''; }"
      class="border border-ink/15 p-4 space-y-4 bg-ink/[0.012]">
    {% csrf_token %}

    <p class="text-[10px] font-bold uppercase tracking-[0.16em] text-ink-muted">Nouvelle représentation</p>

    <div class="grid sm:grid-cols-3 gap-3">

        <!-- Date et heure -->
        <div class="space-y-1">
            <label for="id_datetime" class="block text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted">
                Date et heure *
            </label>
            <input type="datetime-local" name="datetime" id="id_datetime" required
                   class="w-full border border-ink/20 px-3 py-2 text-sm text-ink bg-surface
                          focus:outline-none focus:border-ink transition-colors">
            {% if form.datetime.errors %}<p class="text-red-500 text-xs">{{ form.datetime.errors }}</p>{% endif %}
        </div>

        <!-- Ville -->
        <div class="space-y-1">
            <label class="block text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted">
                Ville
            </label>
            <mapbox-search-box access-token="{{ MAPBOX_ACCESS_TOKEN }}" proximity="0,0"></mapbox-search-box>
            <input class="w-full border border-ink/20 px-3 py-2 text-sm text-ink bg-surface
                          focus:outline-none focus:border-ink transition-colors"
                   type="text" name="city" maxlength="255" id="id_city"
                   tabindex="-1" onkeydown="return false;" onpaste="return false;"
                   autocomplete="off" style="pointer-events:none;">
        </div>

        <!-- Lieu -->
        <div class="space-y-1">
            <label for="id_venue" class="block text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted">
                Lieu *
            </label>
            <input type="text" name="venue" id="id_venue" required maxlength="255"
                   placeholder="Théâtre municipal"
                   class="w-full border border-ink/20 px-3 py-2 text-sm text-ink bg-surface
                          focus:outline-none focus:border-ink transition-colors">
            {% if form.venue.errors %}<p class="text-red-500 text-xs">{{ form.venue.errors }}</p>{% endif %}
        </div>

    </div>

    <!-- Tarif + Billetterie -->
    <div class="grid sm:grid-cols-2 gap-3">
        <div class="space-y-1">
            <label for="id_price" class="block text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted">
                Tarif
            </label>
            <input type="text" name="price" id="id_price" maxlength="50"
                   placeholder="ex. : 12 €, entrée libre…"
                   class="w-full border border-ink/20 px-3 py-2 text-sm text-ink bg-surface
                          focus:outline-none focus:border-ink transition-colors">
        </div>
        <div class="space-y-1">
            <label for="id_ticket_url" class="block text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted">
                Lien billetterie
            </label>
            <input type="url" name="ticket_url" id="id_ticket_url"
                   placeholder="https://…"
                   class="w-full border border-ink/20 px-3 py-2 text-sm text-ink bg-surface
                          focus:outline-none focus:border-ink transition-colors">
            {% if form.ticket_url.errors %}<p class="text-red-500 text-xs">{{ form.ticket_url.errors }}</p>{% endif %}
        </div>
    </div>

    <div class="flex items-center gap-3 pt-1">
        <button type="submit"
                class="px-5 py-2.5 bg-ink text-white text-[11px] font-bold uppercase tracking-[0.12em]
                       hover:opacity-80 transition-opacity cursor-pointer">
            Ajouter
        </button>
        <button type="button"
                onclick="document.getElementById('representation-form').innerHTML=''"
                class="text-[11px] font-bold uppercase tracking-[0.12em] text-ink-muted hover:text-ink transition-colors">
            Annuler
        </button>
    </div>

</form>
