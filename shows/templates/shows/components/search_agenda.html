<!-- Barre de recherche + filtres agenda -->
<form
    hx-get="{% url 'shows:agenda-filter' %}"
    hx-trigger="change, keyup delay:300ms"
    hx-target="#plays_table"
    hx-include="this"
    class="w-full"
>

    <!-- Champ de recherche principal -->
    <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-[11px] text-ink-muted pointer-events-none"></i>
        <input type="text" name="search"
               placeholder="Rechercher par titre, ville, genre…"
               class="w-full pl-9 pr-4 py-2.5 border border-ink/20 text-sm text-ink placeholder-ink-muted/50
                      focus:outline-none focus:border-ink transition-colors bg-surface">
        <div id="loading-indicator" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
            <i class="fa-solid fa-circle-notch fa-spin text-[11px] text-ink-muted"></i>
        </div>
    </div>

    <!-- Raccourcis de dates -->
    <div class="mt-2.5 flex flex-wrap gap-1.5">
        <button type="button" onclick="setTodayRange(this)"
                class="inline-flex items-center px-2 py-1 text-[9px] font-bold uppercase tracking-[0.12em]
                       border border-ink/20 text-ink-soft hover:border-ink hover:text-ink transition-colors">
            Aujourd'hui
        </button>
        <button type="button" onclick="setNextDays(this, 7)"
                class="inline-flex items-center px-2 py-1 text-[9px] font-bold uppercase tracking-[0.12em]
                       border border-ink/20 text-ink-soft hover:border-ink hover:text-ink transition-colors">
            7 prochains jours
        </button>
        <button type="button" onclick="setNextDays(this, 30)"
                class="inline-flex items-center px-2 py-1 text-[9px] font-bold uppercase tracking-[0.12em]
                       border border-ink/20 text-ink-soft hover:border-ink hover:text-ink transition-colors">
            30 prochains jours
        </button>
        <button type="button" onclick="resetDates(this)"
                class="inline-flex items-center px-2 py-1 text-[9px] font-bold uppercase tracking-[0.12em]
                       border border-ink/8 text-ink-muted hover:border-ink/20 hover:text-ink-soft transition-colors">
            <i class="fa-solid fa-xmark text-[8px] mr-1"></i>Réinitialiser
        </button>
    </div>

    <!-- Plus de filtres (accordion) -->
    <div x-data="{ open: false }" class="mt-2 border-t border-ink/8">
        <button type="button"
                @click="open = !open"
                class="flex items-center gap-1.5 py-2.5 text-[10px] font-bold uppercase tracking-[0.14em]
                       text-ink-muted hover:text-ink transition-colors w-full text-left">
            <i class="fa-solid fa-sliders text-[9px]"></i>
            Plus de filtres
            <i class="fa-solid fa-chevron-down text-[8px] ml-auto transition-transform duration-200"
               :class="open ? 'rotate-180' : ''"></i>
        </button>

        <div x-show="open" x-collapse x-cloak>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 pb-4">

                <div class="space-y-1">
                    <label for="id_genre" class="block text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted">
                        Genre
                    </label>
                    <select name="genre" id="id_genre"
                            class="w-full border border-ink/20 px-3 py-2 text-sm text-ink
                                   focus:outline-none focus:border-ink transition-colors bg-surface">
                        <option value="">Tous les genres</option>
                        <option value="theatre">Théâtre</option>
                        <option value="dance">Danse</option>
                        <option value="lyric">Lyrique</option>
                        <option value="circus">Cirque</option>
                        <option value="youth">Jeune public</option>
                        <option value="other">Autres</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label for="id_date_from" class="block text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted">
                        À partir du
                    </label>
                    <input type="date" name="date_from" id="id_date_from"
                           class="w-full border border-ink/20 px-3 py-2 text-sm text-ink
                                  focus:outline-none focus:border-ink transition-colors bg-surface">
                </div>

                <div class="space-y-1">
                    <label for="id_date_to" class="block text-[10px] font-bold uppercase tracking-[0.14em] text-ink-muted">
                        Jusqu'au
                    </label>
                    <input type="date" name="date_to" id="id_date_to"
                           class="w-full border border-ink/20 px-3 py-2 text-sm text-ink
                                  focus:outline-none focus:border-ink transition-colors bg-surface">
                </div>

            </div>
        </div>
    </div>

</form>

<script>
    document.body.addEventListener('htmx:configRequest', function() {
        document.getElementById('loading-indicator')?.classList.remove('hidden');
    });
    document.body.addEventListener('htmx:afterRequest', function() {
        document.getElementById('loading-indicator')?.classList.add('hidden');
    });

    function toISODate(d) {
        return `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;
    }
    function setTodayRange(btn) {
        const iso = toISODate(new Date());
        document.getElementById('id_date_from').value = iso;
        document.getElementById('id_date_to').value = iso;
        btn.closest('form').dispatchEvent(new Event('change', { bubbles: true }));
    }
    function setNextDays(btn, days) {
        const start = new Date();
        const end = new Date();
        end.setDate(end.getDate() + days - 1);
        document.getElementById('id_date_from').value = toISODate(start);
        document.getElementById('id_date_to').value = toISODate(end);
        btn.closest('form').dispatchEvent(new Event('change', { bubbles: true }));
    }
    function resetDates(btn) {
        document.getElementById('id_date_from').value = '';
        document.getElementById('id_date_to').value = '';
        btn.closest('form').dispatchEvent(new Event('change', { bubbles: true }));
    }
</script>
